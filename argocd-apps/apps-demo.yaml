apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiops-apps-demo
  namespace: argocd
  labels:
    app.kubernetes.io/name: aiops-apps-demo
    app.kubernetes.io/part-of: aiops-platform
    aiops.dev/environment: demo
spec:
  project: default
  source:
    repoURL: https://github.com/truong-devops/aiops-gitops-manifests.git
    targetRevision: main
    path: apps/overlays/demo
  destination:
    server: https://kubernetes.default.svc
    namespace: app-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
