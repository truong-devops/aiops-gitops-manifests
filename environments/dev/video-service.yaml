apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-service
  labels:
    app.kubernetes.io/name: video-service
    app.kubernetes.io/part-of: aiops-video-platform
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: video-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: video-service
        app.kubernetes.io/part-of: aiops-video-platform
    spec:
      containers:
        - name: video-service
          image: harbor.local/aiops/video-service:dev-placeholder
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: video-service
  labels:
    app.kubernetes.io/name: video-service
    app.kubernetes.io/part-of: aiops-video-platform
spec:
  selector:
    app.kubernetes.io/name: video-service
  ports:
    - name: http
      port: 80
      targetPort: http
