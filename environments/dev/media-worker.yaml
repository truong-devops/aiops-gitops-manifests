apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-worker
  labels:
    app.kubernetes.io/name: media-worker
    app.kubernetes.io/part-of: aiops-video-platform
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: media-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-worker
        app.kubernetes.io/part-of: aiops-video-platform
    spec:
      containers:
        - name: media-worker
          image: harbor.local/aiops/media-worker:dev-placeholder
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: media-worker
  labels:
    app.kubernetes.io/name: media-worker
    app.kubernetes.io/part-of: aiops-video-platform
spec:
  selector:
    app.kubernetes.io/name: media-worker
  ports:
    - name: http
      port: 80
      targetPort: http
