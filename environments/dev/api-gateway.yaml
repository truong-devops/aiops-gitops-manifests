apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: aiops-video-platform
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: aiops-video-platform
    spec:
      containers:
        - name: api-gateway
          image: harbor.local/aiops/api-gateway:dev-placeholder
          env:
            - name: IDENTITY_SERVICE_URL
              value: http://identity-service
            - name: VIDEO_SERVICE_URL
              value: http://video-service
            - name: FEED_SERVICE_URL
              value: http://feed-social-service
            - name: LIVE_SERVICE_URL
              value: http://live-service
            - name: AIOPS_SERVICE_URL
              value: http://aiops-service
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: aiops-video-platform
spec:
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
